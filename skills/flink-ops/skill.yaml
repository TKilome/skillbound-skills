name: flink-ops
version: 0.1.0
display_name: Flink Ops
description: Apache Flink operations with shared REST diagnostics and provider-specific deployment workflows.

metadata:
  providers:
    kubernetes: implemented
    yarn: implemented

runtime:
  type: java
  java: ">=8"
  java_home_required: true
  build: maven
  project_dir: scripts
  build_command: mvn -q package
  entrypoint: "$JAVA_HOME/bin/java -jar scripts/target/flink-intelligent-ops.jar"
  timeout_seconds: 180

permissions:
  network: true
  filesystem: workspace
  kubernetes_api: true

tools:
  # Common Flink REST commands do not require a deployment target.
  - name: get_job_status
    type: read
    command: get_job_status
    requires_confirmation: false
    input_schema: schemas/get_job_status.schema.json

  - name: inspect_cluster
    type: read
    command: inspect_cluster
    requires_confirmation: false
    input_schema: schemas/inspect_cluster.schema.json

  - name: diagnose_job
    type: read
    command: diagnose_job
    requires_confirmation: false
    input_schema: schemas/diagnose_job.schema.json

  - name: diagnose_backpressure
    type: read
    command: diagnose_backpressure
    requires_confirmation: false
    input_schema: schemas/diagnose_backpressure.schema.json

  - name: get_exceptions
    type: read
    command: get_exceptions
    requires_confirmation: false
    input_schema: schemas/get_exceptions.schema.json

  - name: get_checkpoints
    type: read
    command: get_checkpoints
    requires_confirmation: false
    input_schema: schemas/get_checkpoints.schema.json

  - name: stop_job
    type: mutation
    command: stop_job
    requires_confirmation: true
    input_schema: schemas/stop_job.schema.json

  # Kubernetes provider commands use explicit k8s_* names and do not require deploymentTarget.
  - name: k8s_preflight_start
    type: read
    command: k8s_preflight_start
    requires_confirmation: false
    input_schema: schemas/k8s_preflight_start.schema.json

  - name: k8s_check_connectivity
    type: read
    command: k8s_check_connectivity
    requires_confirmation: false
    input_schema: schemas/k8s_check_connectivity.schema.json

  - name: yarn_check_connectivity
    type: read
    command: yarn_check_connectivity
    requires_confirmation: false
    input_schema: schemas/yarn_check_connectivity.schema.json

  - name: check_cli_environment
    type: read
    command: check_cli_environment
    requires_confirmation: false
    input_schema: schemas/check_cli_environment.schema.json

  - name: k8s_check_ingress_controller
    type: read
    command: k8s_check_ingress_controller
    requires_confirmation: false
    input_schema: schemas/k8s_check_ingress_controller.schema.json

  - name: k8s_get_node_ips
    type: read
    command: k8s_get_node_ips
    requires_confirmation: false
    input_schema: schemas/k8s_get_node_ips.schema.json

  - name: k8s_render_ingress_controller_yaml
    type: read
    command: k8s_render_ingress_controller_yaml
    requires_confirmation: false
    input_schema: schemas/k8s_render_ingress_controller_yaml.schema.json

  - name: k8s_build_image
    type: mutation
    command: k8s_build_image
    requires_confirmation: true
    input_schema: schemas/k8s_build_image.schema.json

  - name: k8s_start_job
    type: mutation
    command: k8s_start_job
    requires_confirmation: true
    input_schema: schemas/k8s_start_job.schema.json
